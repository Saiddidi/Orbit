<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Orbit — Social Galaxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root {
  --bg:#03040a;--sun-core:#fff7e0;--sun-mid:#ffd060;--sun-outer:#ff8c00;
  --accent:#7eb8ff;--accent2:#b48cff;--orbit-line:rgba(130,170,255,0.12);
  --card-bg:rgba(6,12,30,0.96);--card-border:rgba(126,184,255,0.25);
  --text:#e8efff;--muted:rgba(200,215,255,0.55);
  --font-d:'Space Mono',monospace;--font-b:'Outfit',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:var(--font-b);overflow:hidden;user-select:none;-webkit-user-select:none;}
#starfield{position:fixed;inset:0;pointer-events:none;z-index:0;}
#galaxy{position:fixed;inset:0;width:100%;height:100%;z-index:1;cursor:grab;touch-action:none;}
#galaxy:active{cursor:grabbing;}

.orbit-ring{fill:none;stroke:var(--orbit-line);stroke-width:1;stroke-dasharray:4 10;}

/* ── Tooltip ── */
#tooltip{
  position:fixed;z-index:999;
  opacity:0;pointer-events:none;
  transition:opacity 0.18s ease, transform 0.18s ease;
  transform:translateY(6px);
  /* mobile: fixed bottom sheet */
}
#tooltip.visible{opacity:1;pointer-events:auto;transform:translateY(0);}

/* Desktop tooltip */
@media(min-width:601px){
  #tooltip{
    min-width:230px;max-width:270px;
    top:0;left:0; /* positioned by JS */
  }
}

/* Mobile: bottom sheet */
@media(max-width:600px){
  #tooltip{
    bottom:0 !important;
    left:0 !important;
    top:auto !important;
    width:100% !important;
    max-width:100% !important;
    transform:translateY(100%);
    border-radius:0;
  }
  #tooltip.visible{transform:translateY(0);}
}

.tip-inner{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:16px;
  padding:14px 16px 16px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,20,0.85),0 0 0 1px rgba(255,255,255,0.04) inset;
}
@media(max-width:600px){
  .tip-inner{
    border-radius:20px 20px 0 0;
    padding:10px 18px 28px;
    border-bottom:none;
  }
  /* drag handle */
  .tip-inner::before{
    content:'';display:block;
    width:40px;height:4px;
    background:rgba(255,255,255,0.15);
    border-radius:2px;margin:0 auto 14px;
  }
}
.tip-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.tip-avatar{
  width:46px;height:46px;border-radius:50%;
  object-fit:cover;flex-shrink:0;
  border:2px solid var(--card-border);
  background:var(--bg);
}
.tip-name{font-weight:600;font-size:15px;line-height:1.2;word-break:break-word;}
.tip-handle{font-family:var(--font-d);font-size:11px;color:var(--accent);margin-top:2px;}
.tip-divider{border:none;border-top:1px solid rgba(126,184,255,0.1);margin:8px 0;}
.tip-date{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.tip-link{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:10px;padding:9px 14px;width:100%;
  background:rgba(126,184,255,0.1);border:1px solid rgba(126,184,255,0.22);
  border-radius:10px;color:var(--accent);font-size:12.5px;
  font-family:var(--font-d);text-decoration:none;
  transition:background 0.18s,border-color 0.18s;cursor:pointer;
}
.tip-link:hover{background:rgba(126,184,255,0.2);border-color:rgba(126,184,255,0.45);}
#tip-close{
  display:none;position:absolute;top:16px;right:16px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:none;
  color:var(--text);font-size:16px;cursor:pointer;
  align-items:center;justify-content:center;
}
@media(max-width:600px){#tip-close{display:flex;}}

/* ── HUD ── */
#hud{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:50;display:none;align-items:center;gap:14px;
  background:rgba(5,9,22,0.82);border:1px solid rgba(126,184,255,0.14);
  border-radius:40px;padding:9px 20px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  white-space:nowrap;font-size:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
#hud-title{font-family:var(--font-d);font-weight:700;letter-spacing:.1em;color:var(--sun-mid);font-size:12px;}
#hud-sep{width:1px;height:16px;background:rgba(126,184,255,0.18);}
#hud-count{color:var(--muted);}#hud-count span{color:var(--accent);font-weight:600;}

/* ── Controls ── */
#controls{position:fixed;bottom:24px;right:18px;z-index:50;display:flex;flex-direction:column;gap:7px;}
.ctrl-btn{
  width:38px;height:38px;border-radius:11px;
  background:rgba(5,9,22,0.85);border:1px solid rgba(126,184,255,0.18);
  color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(10px);
  transition:background .18s,transform .12s;
}
.ctrl-btn:hover{background:rgba(126,184,255,0.14);}
.ctrl-btn:active{transform:scale(0.93);}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .5s ease;
}
#loading.hidden{opacity:0;pointer-events:none;}
.loader-sun{
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 40% 38%,#fff9e8,#ffd060 40%,#ff8c00);
  animation:lp 1.6s ease-in-out infinite alternate;
}
@keyframes lp{
  from{box-shadow:0 0 25px 8px rgba(255,175,0,.35),0 0 60px 20px rgba(255,90,0,.15);}
  to  {box-shadow:0 0 45px 18px rgba(255,175,0,.55),0 0 100px 40px rgba(255,90,0,.25);}
}
#load-text{font-family:var(--font-d);font-size:12px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}
#load-sub{font-size:12px;color:rgba(200,215,255,.3);text-align:center;max-width:240px;line-height:1.5;}
.prog-bar{width:160px;height:2px;background:rgba(126,184,255,.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0%;transition:width .3s ease;}

/* ── Error ── */
#error-panel{
  display:none;position:fixed;inset:0;z-index:300;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;text-align:center;
}
#error-panel.show{display:flex;}
#error-panel h2{font-family:var(--font-d);color:#ff8080;font-size:16px;}
#error-panel p{font-size:13px;color:var(--muted);max-width:380px;line-height:1.7;}
#error-panel code{background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;font-family:var(--font-d);font-size:11px;}

/* ── Overlay (mobile tap outside) ── */
#overlay{display:none;position:fixed;inset:0;z-index:998;}
#overlay.show{display:block;}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="loading">
  <div class="loader-sun"></div>
  <div id="load-text">Mapping your galaxy…</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  <div id="load-sub">Loading follower data</div>
</div>

<div id="error-panel">
  <h2>⚠ Could not load followers.json</h2>
  <p>Place <code>followers.json</code> next to <code>index.html</code> and serve via a local server (<code>npx serve .</code>).<br>Direct <code>file://</code> won't work due to browser security.</p>
</div>

<div id="hud">
  <span id="hud-title">✦ ORBIT</span>
  <div id="hud-sep"></div>
  <span id="hud-count"><span id="fc">0</span> followers · <span id="oc">0</span> rings</span>
</div>

<svg id="galaxy"></svg>

<!-- Overlay for mobile tap-outside -->
<div id="overlay"></div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tip-inner" style="position:relative;">
    <button id="tip-close">×</button>
    <div class="tip-row">
      <img class="tip-avatar" id="tt-av" src="" alt=""/>
      <div>
        <div class="tip-name" id="tt-name"></div>
        <div class="tip-handle" id="tt-handle"></div>
      </div>
    </div>
    <hr class="tip-divider"/>
    <div class="tip-date">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="tt-date"></span>
    </div>
    <a class="tip-link" id="tt-link" href="#" target="_blank" rel="noopener">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open Profile
    </a>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-zi">+</button>
  <button class="ctrl-btn" id="btn-zo">−</button>
  <button class="ctrl-btn" id="btn-r">⌖</button>
  <button class="ctrl-btn" id="btn-p">⏸</button>
</div>

<script>
/* ══════════════════════════════════════════════
   ORBIT v2 — Optimized for mobile performance
   ══════════════════════════════════════════════ */

// ── Config ──────────────────────────────────────
const CFG = {
  owner:          'sa_d.idi',          // ← your Threads username (no @)
  ownerDisplay:   'sa_d.idi',
  sunRadius:      36,
  firstOrbit:     120,
  orbitGap:       85,
  planetR:        20,                   // smaller = faster render
  baseDuration:   70,
  durationInc:    25,
  avatarBatchSize:30,                   // load avatars in batches
  avatarTimeout:  3000,
  avatarSize:     40,                   // px requested from unavatar
  colors: ['#ffd060','#f0a030','#7eb8ff','#5aa0ff','#b48cff',
           '#9060e0','#6effc8','#3ed4a0','#ff8caa','#ff6080'],
};

// ── State ────────────────────────────────────────
let svgEl, zoom, gMain, gOrbits, gPlanets, gSun;
let followers=[], orbitData=[], paused=false, raf=null, t0=null;
let isMobile = window.innerWidth <= 600;
const avatarCache = {};  // idx → dataURL

// ── Starfield (lightweight) ───────────────────────
function initStars(){
  const c=document.getElementById('starfield');
  const ctx=c.getContext('2d');
  let W,H,stars=[];
  const N = isMobile ? 120 : 200;

  function resize(){
    W=c.width=window.innerWidth; H=c.height=window.innerHeight;
    stars=Array.from({length:N},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.2+0.2,
      a:Math.random()*.6+.1,
      sp:Math.random()*.4+.05,
      ph:Math.random()*Math.PI*2
    }));
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const al=s.a*(.55+.45*Math.sin(t*.0008*s.sp+s.ph));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,220,255,${al})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize(); requestAnimationFrame(draw);
}

// ── Helpers ──────────────────────────────────────
function decodeU(s){
  if(!s) return '';
  try{ return s.replace(/\\u([0-9a-fA-F]{4})/g,(_,h)=>String.fromCodePoint(parseInt(h,16))); }
  catch{ return s; }
}
function fmtDate(ts){
  if(!ts) return 'Unknown';
  return new Date(ts*1000).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}
function orbitColor(i){ return CFG.colors[i % CFG.colors.length]; }
function placeholder(name,color){
  const ini=(name||'?').replace(/[^a-zA-Z\u00C0-\u024F\u0400-\u04FF]/g,'').slice(0,2).toUpperCase()||'?';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40">
    <circle cx="20" cy="20" r="20" fill="${color}25"/>
    <text x="20" y="25" text-anchor="middle" fill="${color}" font-size="14"
      font-family="Outfit,sans-serif" font-weight="600">${ini}</text></svg>`;
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
}

// ── Avatar sources (tried in order) ──────────────
// We use a Canvas trick: draw the <img> into canvas → toDataURL → inject into SVG
// This bypasses CORS issues with SVG <image> elements on GitHub Pages.
function avSources(username){
  return [
    // Instagram CDN via public graph (works without auth for public accounts)
    `https://instagram-username-lookup.vercel.app/api/${username}`,
    // ui-avatars as reliable final fallback (always works, no CORS)
    `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&size=64&background=random&color=fff&bold=true&format=svg`,
  ];
}

// Try loading an image from a list of URLs, return first that works
function tryLoadImage(urls, crossOrigin=false){
  return new Promise(res=>{
    let i=0;
    function next(){
      if(i>=urls.length){ res(null); return; }
      const img=new Image();
      if(crossOrigin) img.crossOrigin='anonymous';
      const t=setTimeout(()=>{ i++; next(); }, 3500);
      img.onload=()=>{ clearTimeout(t); res(img); };
      img.onerror=()=>{ clearTimeout(t); i++; next(); };
      img.src=urls[i++];
    }
    next();
  });
}

// Draw img into canvas, return dataURL (avoids CORS SVG restriction)
function imgToDataURL(img, size=44){
  try{
    const c=document.createElement('canvas');
    c.width=c.height=size;
    const ctx=c.getContext('2d');
    ctx.beginPath(); ctx.arc(size/2,size/2,size/2,0,Math.PI*2); ctx.clip();
    ctx.drawImage(img,0,0,size,size);
    return c.toDataURL('image/jpeg',0.75);
  } catch(e){ return null; }
}

// ── Owner avatar fetch ────────────────────────────
async function fetchOwnerAvatar(){
  // ui-avatars always works — use it + try instagram
  const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(CFG.owner)}&size=80&background=ff8c00&color=fff&bold=true&format=svg`;
  const sources = [
    `https://instagram-username-lookup.vercel.app/api/${CFG.owner}`,
    fallback
  ];
  const img = await tryLoadImage(sources, true);
  if(img){
    try{ return imgToDataURL(img, 80) || fallback; } catch{ return fallback; }
  }
  return fallback;
}

// ── Layout ────────────────────────────────────────
function buildLayout(followers){
  const orbits=[]; let i=0, ri=0;
  while(i<followers.length){
    const r=CFG.firstOrbit+ri*CFG.orbitGap;
    const cap=Math.max(4, Math.floor((2*Math.PI*r)/(CFG.planetR*2*6)));
    const slice=followers.slice(i,i+cap);
    orbits.push({ri,radius:r,color:orbitColor(ri),planets:slice});
    i+=cap; ri++;
  }
  return orbits;
}

// ── Progress ──────────────────────────────────────
function setP(pct,msg){
  document.getElementById('prog-fill').style.width=pct+'%';
  if(msg) document.getElementById('load-sub').textContent=msg;
}

// ── Main ──────────────────────────────────────────
async function main(){
  initStars();
  setP(5,'Fetching followers.json…');

  let raw;
  try{
    const res=await fetch('./followers.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    raw=await res.json();
  } catch(e){
    console.error(e);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error-panel').classList.add('show');
    return;
  }

  setP(20,'Parsing followers…');
  const key=Object.keys(raw).find(k=>k.includes('follower'));
  const items=(key?raw[key]:raw)||[];

  followers=items.map((item,idx)=>{
    const sd=(item.string_list_data||[])[0]||{};
    const rawName = item.title || sd.value || 'Unknown';
    const name=decodeU(rawName);
    const uname=sd.value||'unknown';
    const href=sd.href||'#';
    const ts=sd.timestamp||0;
    const color=CFG.colors[idx%CFG.colors.length];
    return{name,uname,handle:'@'+uname,href,ts,color,idx};
  });

  setP(40,'Building orbits…');
  orbitData=buildLayout(followers);

  setP(60,'Rendering…');
  initSVG();
  drawOrbits();

  // Fetch owner avatar
  setP(70,'Fetching your profile picture…');
  const ownerAv = await fetchOwnerAvatar();
  drawSun(ownerAv);

  setP(85,'Placing followers…');
  drawPlanets();
  setupControls();
  setupOrientation();

  document.getElementById('fc').textContent=followers.length;
  document.getElementById('oc').textContent=orbitData.length;
  document.getElementById('hud').style.display='flex';

  setP(100,'Done!');
  setTimeout(()=>{
    document.getElementById('loading').classList.add('hidden');
    raf=requestAnimationFrame(animate);
    // Load avatars in background batches
    loadAvatarsBatched();
  },350);
}

// ── Batched avatar loading — Canvas approach ──────
// Key insight: SVG <image> has CORS issues on GitHub Pages.
// Solution: load via <img>, draw to <canvas>, get dataURL, inject into SVG <image>.
// ui-avatars.com is our reliable fallback (no CORS, always returns an image).
function loadAvatarsBatched(){
  const all = followers.slice();
  let cursor = 0;
  const BATCH = 15;  // smaller batches = smoother

  function getAvatarSources(uname){
    const initial = (uname||'?').slice(0,2).toUpperCase();
    // ui-avatars is CORS-safe and always works
    const uiColor = CFG.colors[Math.floor(Math.random()*CFG.colors.length)].replace('#','');
    return [
      // Primary: try Threads via a CORS proxy
      `https://api.allorigins.win/raw?url=${encodeURIComponent('https://unavatar.io/threads/'+uname+'?s=48')}`,
      // Reliable fallback: ui-avatars (styled initials, no CORS)
      `https://ui-avatars.com/api/?name=${encodeURIComponent(uname)}&size=48&background=${uiColor}&color=fff&bold=true&format=svg`,
    ];
  }

  async function loadOne(f){
    const sources = getAvatarSources(f.uname);
    const img = await tryLoadImage(sources, true);
    if(!img) return;

    let dataUrl;
    try{ dataUrl = imgToDataURL(img, 44); } catch(e){ return; }
    if(!dataUrl) return;

    // Inject into SVG
    const svgImg = document.querySelector(`image[data-uid="${f.idx}"]`);
    if(svgImg){
      svgImg.setAttribute('href', dataUrl);
      svgImg.setAttributeNS('http://www.w3.org/1999/xlink','href', dataUrl);
    }
    // Also update tooltip avatar cache
    avatarCache[f.idx] = dataUrl;
  }

  async function processBatch(){
    const batch = all.slice(cursor, cursor + BATCH);
    cursor += BATCH;
    if(!batch.length) return;
    // Load batch in parallel
    await Promise.allSettled(batch.map(f => loadOne(f)));
    // Pause between batches to avoid rate limiting
    if(cursor < all.length) setTimeout(processBatch, 800);
  }

  setTimeout(processBatch, 1000);
}

// ── Init SVG + D3 zoom ────────────────────────────
function initSVG(){
  svgEl=d3.select('#galaxy');
  const defs=svgEl.append('defs');

  // Sun gradient
  const sg=defs.append('radialGradient').attr('id','sG').attr('cx','40%').attr('cy','38%').attr('r','60%');
  sg.append('stop').attr('offset','0%').attr('stop-color','#fff9e8');
  sg.append('stop').attr('offset','40%').attr('stop-color','#ffd060');
  sg.append('stop').attr('offset','75%').attr('stop-color','#ff8c00');
  sg.append('stop').attr('offset','100%').attr('stop-color','#cc3300');

  // Corona gradient
  const cg=defs.append('radialGradient').attr('id','cG').attr('cx','50%').attr('cy','50%').attr('r','50%');
  cg.append('stop').attr('offset','20%').attr('stop-color','rgba(255,160,0,0.3)');
  cg.append('stop').attr('offset','100%').attr('stop-color','rgba(255,80,0,0)');

  // Sun glow filter
  const f=defs.append('filter').attr('id','sF').attr('x','-150%').attr('y','-150%').attr('width','400%').attr('height','400%');
  f.append('feGaussianBlur').attr('in','SourceGraphic').attr('stdDeviation','12').attr('result','b');
  const fm=f.append('feMerge'); fm.append('feMergeNode').attr('in','b'); fm.append('feMergeNode').attr('in','SourceGraphic');

  gMain=svgEl.append('g').attr('id','gM');
  gOrbits=gMain.append('g');
  gPlanets=gMain.append('g');
  gSun=gMain.append('g');

  zoom=d3.zoom().scaleExtent([0.08,6])
    .on('zoom',e=>gMain.attr('transform',e.transform));
  svgEl.call(zoom);
  centerView();
}

function centerView(){
  const W=window.innerWidth, H=window.innerHeight;
  svgEl.call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2));
}

// ── Draw orbits ───────────────────────────────────
function drawOrbits(){
  orbitData.forEach((o,i)=>{
    gOrbits.append('circle')
      .attr('class','orbit-ring')
      .attr('cx',0).attr('cy',0).attr('r',o.radius)
      .attr('stroke-dashoffset', i*15); // stagger dashes
  });
}

// ── Draw Sun ──────────────────────────────────────
function drawSun(avatarUrl){
  const R=CFG.sunRadius;
  gSun.append('circle').attr('cx',0).attr('cy',0).attr('r',R*2.6).attr('fill','url(#cG)');
  gSun.append('circle').attr('cx',0).attr('cy',0).attr('r',R)
    .attr('fill','url(#sG)').attr('filter','url(#sF)').attr('opacity',0.5);
  const sun=gSun.append('circle').attr('cx',0).attr('cy',0).attr('r',R).attr('fill','url(#sG)');

  if(avatarUrl){
    const clipId='sc';
    d3.select('defs').append('clipPath').attr('id',clipId)
      .append('circle').attr('cx',0).attr('cy',0).attr('r',R-1);
    gSun.append('image')
      .attr('href',avatarUrl)
      .attr('x',-(R-1)).attr('y',-(R-1))
      .attr('width',(R-1)*2).attr('height',(R-1)*2)
      .attr('clip-path','url(#sc)')
      .attr('preserveAspectRatio','xMidYMid slice');
  } else {
    // Text label
    gSun.append('text')
      .attr('text-anchor','middle').attr('dy','5')
      .attr('fill','#fff9e8').attr('font-size','10')
      .attr('font-family',CFG.fontB)
      .text(CFG.ownerDisplay.slice(0,6));
  }

  // Pulse ring
  const pr=gSun.append('circle').attr('cx',0).attr('cy',0).attr('r',R+3)
    .attr('fill','none').attr('stroke','rgba(255,200,0,0.4)').attr('stroke-width',1.5);
  (function pulse(){
    pr.attr('r',R+3).attr('opacity',0.7)
      .transition().duration(2200).ease(d3.easeSinInOut)
      .attr('r',R+20).attr('opacity',0).on('end',pulse);
  })();
}

// ── Draw Planets ──────────────────────────────────
function drawPlanets(){
  const R=CFG.planetR;
  orbitData.forEach(orbit=>{
    orbit.planets.forEach((f,pi)=>{
      const g=gPlanets.append('g')
        .attr('class','pg')
        .attr('data-idx',f.idx)
        .style('cursor','pointer');

      const clipId='pc'+f.idx;
      d3.select('defs').append('clipPath').attr('id',clipId)
        .append('circle').attr('cx',0).attr('cy',0).attr('r',R);

      // Avatar image — uses placeholder initially
      g.append('image')
        .attr('data-uid',f.idx)
        .attr('href', placeholder(f.name, orbit.color))
        .attr('x',-R).attr('y',-R)
        .attr('width',R*2).attr('height',R*2)
        .attr('clip-path',`url(#${clipId})`)
        .attr('preserveAspectRatio','xMidYMid slice');

      // Ring border
      g.append('circle').attr('r',R).attr('fill','none')
        .attr('stroke',orbit.color).attr('stroke-width',1.8);

      // Events
      g.on('mouseenter', function(ev){ showTip(ev,f,orbit); })
       .on('mousemove',  function(ev){ moveTip(ev); })
       .on('mouseleave', hideTip)
       .on('touchstart', function(ev){
          ev.stopPropagation();
          showTip(ev.touches[0]||ev.changedTouches[0], f, orbit);
        },{passive:true});
    });
  });
}

// ── Animation loop ────────────────────────────────
function animate(ts){
  if(!t0) t0=ts;
  if(!paused){
    const el=(ts-t0)/1000;
    orbitData.forEach((orbit,oi)=>{
      const dur=CFG.baseDuration+oi*CFG.durationInc;
      const spd=(2*Math.PI)/dur;
      const dir=oi%2===0?1:-1;
      const n=orbit.planets.length;
      orbit.planets.forEach((f,pi)=>{
        const base=(2*Math.PI*pi)/n;
        const ang=base+dir*spd*el;
        const x=orbit.radius*Math.cos(ang);
        const y=orbit.radius*Math.sin(ang);
        const el2=gPlanets.select(`[data-idx="${f.idx}"]`);
        if(!el2.empty()) el2.attr('transform',`translate(${x},${y})`);
      });
    });
  }
  raf=requestAnimationFrame(animate);
}

// ── Tooltip ───────────────────────────────────────
const tip=document.getElementById('tooltip');
const overlay=document.getElementById('overlay');

function showTip(ev,f,orbit){
  document.getElementById('tt-name').textContent=f.name;
  document.getElementById('tt-handle').textContent=f.handle;
  document.getElementById('tt-date').textContent='Followed '+fmtDate(f.ts);
  document.getElementById('tt-link').href=f.href;

  const av=document.getElementById('tt-av');
  // Use cached dataURL if available, else placeholder, then try ui-avatars
  if(avatarCache[f.idx]){
    av.src = avatarCache[f.idx];
  } else {
    av.src = placeholder(f.name, orbit.color);
    const uiColor = orbit.color.replace('#','');
    const uiUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(f.uname)}&size=64&background=${uiColor}&color=fff&bold=true&format=svg`;
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://unavatar.io/threads/'+f.uname+'?s=64')}`;
    // Try proxy first, then ui-avatars
    const tImg = new Image(); tImg.crossOrigin='anonymous';
    tImg.onload = () => { av.src = tImg.src; };
    tImg.onerror = () => { av.src = uiUrl; };
    tImg.src = proxyUrl;
  }

  if(isMobile){
    tip.style.cssText='';  // clear inline position
    overlay.classList.add('show');
  } else {
    positionTip(ev);
  }
  tip.classList.add('visible');
}

function positionTip(ev){
  const vw=window.innerWidth, vh=window.innerHeight;
  let x=(ev.clientX||0)+14, y=(ev.clientY||0)+14;
  const tw=270, th=200;
  if(x+tw>vw-8) x=(ev.clientX||0)-tw-10;
  if(y+th>vh-8) y=(ev.clientY||0)-th-10;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

function moveTip(ev){
  if(!isMobile && tip.classList.contains('visible')) positionTip(ev);
}

function hideTip(){
  tip.classList.remove('visible');
  overlay.classList.remove('show');
}

document.getElementById('tip-close').addEventListener('click', hideTip);
overlay.addEventListener('click', hideTip);

// ── Controls ──────────────────────────────────────
function setupControls(){
  document.getElementById('btn-zi').onclick=()=>svgEl.transition().call(zoom.scaleBy,1.45);
  document.getElementById('btn-zo').onclick=()=>svgEl.transition().call(zoom.scaleBy,0.68);
  document.getElementById('btn-r').onclick=()=>{
    svgEl.transition().duration(500).call(zoom.transform,
      d3.zoomIdentity.translate(window.innerWidth/2,window.innerHeight/2));
  };
  document.getElementById('btn-p').addEventListener('click',function(){
    paused=!paused; this.textContent=paused?'▶':'⏸';
    if(!paused){t0=null; raf=requestAnimationFrame(animate);}
  });
}

// ── Orientation / Resize ──────────────────────────
function setupOrientation(){
  function onResize(){
    isMobile=window.innerWidth<=600;
    centerView();
    if(tip.classList.contains('visible')) hideTip();
  }
  window.addEventListener('resize',onResize);
  window.addEventListener('orientationchange',()=>setTimeout(onResize,200));
}

// ── Boot ──────────────────────────────────────────
main();
</script>
